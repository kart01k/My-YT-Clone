<!DOCTYPE html>
<html>
    <head>
        <title>
            Position
        </title>

    </head>
    <body style="height: 3000px;
    padding-top: 100px;
    padding-left: 100px;
    margin: 0px;
    ">
        <div style="
            background-color: rgb(252, 126, 126);
            height: 100px;
            width: 100%;
            color: white;
            position: fixed;
            top: 0px;
            left: 0px;
            right: 0px;
            z-index: 100;

            ">
            Header

        </div>
        <div style="
        background-color: blueviolet;
        height: 100%;
        width: 100px;
        position: fixed;
        left: 0px;">
            Side Bar
        </div>
        <div>
            <div style="
            background-color: lightcyan;
            height: 200px;
            width: 200px;
            position: relative;
            ">
            div-1
            <div style="position: absolute;
            bottom: 10px;
            right: 10px;
            
            color: aliceblue;
            background-color: black;">
                14:20
            </div>
            </div>
            <div style="
                background-color: lightsalmon;
                height: 200px;
                width: 200px;
                ">
                div-2
            </div>
        </div>
    </body>
</html>
